<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 我的世界 - 昼夜生物版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: sans-serif; }
        #blocker {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 10;
        }
        #instructions { text-align: center; font-size: 20px; cursor: pointer; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; transform: translate(-50%, -50%);
            color: white; font-size: 24px; font-weight: bold; text-align: center; line-height: 20px;
            pointer-events: none; text-shadow: 1px 1px 2px black; z-index: 5;
        }
        .slot {
            width: 50px; height: 50px; border: 2px solid #777; background-color: #333;
            display: flex; align-items: center; justify-content: center; color: white; font-weight: bold;
            font-size: 12px; cursor: pointer;
        }
        .slot.selected { border-color: #FFEB3B; background-color: #555; }
        #inventory-ui {
            display: none;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background-color: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
            color: white; text-align: center; border: 4px solid #555; z-index: 20; width: 400px;
        }
        #inventory-ui .slot-container {
            display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 20px;
        }
        .tab-btn {
            background-color: #4CAF50; border: none; color: white; padding: 10px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; margin: 0 5px;
        }
        .tab-btn.active {
            background-color: #2E7D32; border: 2px solid #FFEB3B;
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    
    <div id="inventory-ui">
        <h2>物资储备仓</h2>
        <div style="display:flex; justify-content:center; gap:10px; margin-bottom:15px;">
            <button class="tab-btn active" onclick="switchTab('build', this)">搭建类</button>
            <button class="tab-btn" onclick="switchTab('life', this)">日常生活类</button>
            <button class="tab-btn" onclick="switchTab('weapon', this)">武器类</button>
            <button class="tab-btn" onclick="switchTab('redstone', this)">红石类</button>
        </div>
        <p>点击选择物品，按 E 键返回游戏</p>
        
        <div id="tab-build" class="slot-container" style="display:flex;">
            <div class="slot selected" id="inv-1" onclick="selectSlot(1)">泥土</div>
            <div class="slot" id="inv-2" onclick="selectSlot(2)">石头</div>
            <div class="slot" id="inv-3" onclick="selectSlot(3)">木头</div>
            <div class="slot" id="inv-4" onclick="selectSlot(4)">树叶</div>
            <div class="slot" id="inv-5" onclick="selectSlot(5)">玻璃</div>
            <div class="slot" id="inv-6" onclick="selectSlot(6)">梯子</div>
            <div class="slot" id="inv-7" onclick="selectSlot(7)">木门</div>
            <div class="slot" id="inv-12" onclick="selectSlot(12)">大铁门</div>
            <div class="slot" id="inv-15" onclick="selectSlot(15)">沙子</div>
            <div class="slot" id="inv-16" onclick="selectSlot(16)">水</div>
            <div class="slot" id="inv-17" onclick="selectSlot(17)">海带</div>
        </div>
        <div id="tab-life" class="slot-container" style="display:none;">
            <div class="slot" id="inv-8" onclick="selectSlot(8)">工作台</div>
            <div class="slot" id="inv-9" onclick="selectSlot(9)">熔炉</div>
            <div class="slot" id="inv-10" onclick="selectSlot(10)">床</div>
            <div class="slot" id="inv-11" onclick="selectSlot(11)">火把</div>
        </div>
        <div id="tab-weapon" class="slot-container" style="display:none;">
            <div class="slot" id="inv-24" onclick="selectSlot(24)">剑</div>
            <div class="slot" id="inv-25" onclick="selectSlot(25)">镐子</div>
            <div class="slot" id="inv-26" onclick="selectSlot(26)">枪</div>
        </div>
        <div id="tab-redstone" class="slot-container" style="display:none;">
            <div class="slot" id="inv-18" onclick="selectSlot(18)">铁轨</div>
            <div class="slot" id="inv-19" onclick="selectSlot(19)">动力轨</div>
            <div class="slot" id="inv-20" onclick="selectSlot(20)">红石</div>
            <div class="slot" id="inv-21" onclick="selectSlot(21)">矿车</div>
            <div class="slot" id="inv-22" onclick="selectSlot(22)">拉杆</div>
            <div class="slot" id="inv-23" onclick="selectSlot(23)">附魔台</div>
            <div class="slot" id="inv-13" onclick="selectSlot(13)">TNT</div>
            <div class="slot" id="inv-14" onclick="selectSlot(14)">核弹</div>
        </div>
    </div>

    <div id="oxygen-ui" style="display: none; position: absolute; top: 50px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #00FFFF; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 5;">
        氧气: 20:00
    </div>
    <div id="minecart-ui" style="display: none; position: absolute; top: 80px; left: 50%; transform: translateX(-50%); font-size: 24px; color: #FFD700; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 5;">
        正在乘坐矿车 (按 E 下车)
    </div>
    <div id="info-panel" style="position: absolute; top: 10px; right: 10px; font-size: 16px; color: #00FF00; font-weight: bold; text-shadow: 2px 2px 4px black; z-index: 5; background-color: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; text-align: right; line-height: 1.5;">
        <div id="fps-counter">FPS: 60</div>
        <div id="coord-x">X: 0</div>
        <div id="coord-y">Y: 0</div>
        <div id="coord-z">Z: 0</div>
    </div>

    <!-- 自动建造 UI -->
    <div id="autobuild-ui" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; color: white; text-align: center; border: 4px solid #555; z-index: 20; width: 350px;">
        <h2>自动附魔建造</h2>
        <button onclick="doAutoBuild('house')" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer;">自动建造普通房屋</button>
        <button onclick="doAutoBuild('villa')" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer;">建造豪华别墅(含院子+动物)</button>
        <button id="btn-skyscraper" onclick="doAutoBuild('skyscraper')" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer; display: none; background-color: #4CAF50; border: none; border-radius: 5px;">建造 30 层摩天大楼(需 10 附魔台+2 红石)</button>
        <button onclick="closeUI()" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer;">取消</button>
    </div>

    <!-- 村民交易 UI -->
    <div id="trade-ui" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; color: white; text-align: center; border: 4px solid #555; z-index: 20; width: 350px;">
        <h2 id="trade-title">村民交易</h2>
        <p id="trade-desc">给予木头，村民将扩建房屋并奖励牛羊</p>
        <button id="trade-btn" onclick="doTrade('house')" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer; background-color: #4CAF50; border: none; border-radius: 5px; color: white; font-weight: bold;">给予木头并扩建房屋</button>
        <button onclick="closeUI()" style="margin: 10px; padding: 10px; width: 90%; font-size: 16px; cursor: pointer; border: none; border-radius: 5px;">离开</button>
    </div>

    <div id="blocker">
        <div id="start-menu" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #555; background-image: radial-gradient(#444 15%, transparent 16%), radial-gradient(#444 15%, transparent 16%); background-size: 32px 32px; background-position: 0 0, 16px 16px; text-align: center; color: white; z-index: 30;">
            <div style="margin-bottom: 50px;">
                <h1 style="font-size: 80px; font-weight: 900; text-shadow: 4px 4px 8px black; margin: 0; letter-spacing: 2px;">MineWorld</h1>
                <h2 style="font-size: 32px; font-weight: normal; color: #AEEA00; text-shadow: 2px 2px 4px black; margin: 10px 0 0 0;">3D 版</h2>
            </div>
            <div style="display: flex; gap: 40px; justify-content: center; margin-bottom: 20px;">
                <button onclick="startNewGame(false)" style="padding: 20px 50px; font-size: 26px; cursor: pointer; background-color: #4CAF50; border: none; border-radius: 8px; color: white; font-weight: bold; width: 320px; box-shadow: 0 6px 10px rgba(0,0,0,0.4); transition: transform 0.1s;">开始单人游戏</button>
                <button onclick="showMultiplayerMenu()" style="padding: 20px 50px; font-size: 26px; cursor: pointer; background-color: #FF9800; border: none; border-radius: 8px; color: white; font-weight: bold; width: 320px; box-shadow: 0 6px 10px rgba(0,0,0,0.4); transition: transform 0.1s;">联机游戏</button>
            </div>
            <button onclick="document.getElementById('load-file').click()" style="padding: 15px 40px; font-size: 20px; cursor: pointer; background-color: #2196F3; border: none; border-radius: 8px; color: white; font-weight: bold; width: 320px; box-shadow: 0 4px 6px rgba(0,0,0,0.4);">寻找文件 (导入存档)</button>
            <input type="file" id="load-file" accept=".json" onchange="loadSaveFile(event)" style="display:none">
        </div>
        
        <!-- 联机菜单 -->
        <div id="multiplayer-menu" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0,0,0,0.85); padding: 30px; border-radius: 10px; color: white; text-align: center; border: 4px solid #555; z-index: 40; width: 450px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            <h2 style="margin-top: 0; color: #4CAF50;">多人联机模式</h2>
            
            <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 25px;">
                <p style="margin: 0 0 10px 0; font-size: 16px; color: #ccc;">您的服务器公网地址 (复制发给朋友):</p>
                <p id="my-ip-display" style="margin: 0; font-size: 26px; font-weight: bold; color: #FFeb3b; user-select: all; letter-spacing: 2px;">正在获取...</p>
            </div>

            <hr style="border-color: #555; margin-bottom: 20px;">

            <h3 style="margin: 0 0 15px 0; font-size: 20px;">加入朋友的服务器:</h3>
            <input type="text" id="server-ip" placeholder="输入朋友的服务器地址 (默认 Minecraft)" value="Minecraft" style="width: 90%; padding: 12px; margin-bottom: 20px; font-size: 18px; text-align: center; border-radius: 5px; border: none; background: #fff;">
            
            <button onclick="connectToServer()" style="margin: 10px auto; padding: 15px; width: 90%; font-size: 20px; cursor: pointer; background-color: #2196F3; border: none; border-radius: 5px; color: white; font-weight: bold; display: block; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">连接并进入世界</button>
            <button onclick="hideMultiplayerMenu()" style="margin: 10px auto; padding: 12px; width: 90%; font-size: 18px; cursor: pointer; background-color: #f44336; border: none; border-radius: 5px; color: white; font-weight: bold; display: block;">返回主菜单</button>
        </div>
        <div id="pause-menu" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0,0,0,0.85); padding: 30px; border-radius: 10px; color: white; text-align: center; border: 4px solid #555; z-index: 20; width: 350px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            <div style="position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #ff5555; font-weight: bold;" onclick="resumeGame()">✖</div>
            <h2 style="margin-top: 0;">游戏暂停</h2>
            <p style="margin-bottom: 30px; font-size: 16px;">是否下载并保存当前世界？</p>
            <button onclick="downloadSave()" style="margin: 10px auto; padding: 12px; width: 90%; font-size: 18px; cursor: pointer; background-color: #FF9800; border: none; border-radius: 5px; color: white; font-weight: bold; display: block;">是否下载 (保存存档)</button>
            <button onclick="startNewGame(true)" style="margin: 10px auto; padding: 12px; width: 90%; font-size: 18px; cursor: pointer; background-color: #f44336; border: none; border-radius: 5px; color: white; font-weight: bold; display: block;">重新开始</button>
            <button onclick="resumeGame()" style="margin: 10px auto; padding: 12px; width: 90%; font-size: 18px; cursor: pointer; background-color: #4CAF50; border: none; border-radius: 5px; color: white; font-weight: bold; display: block;">继续游戏</button>
        </div>
    </div>

    <div id="toast-msg" style="display: none; position: absolute; top: 20%; left: 50%; transform: translateX(-50%); font-size: 24px; color: #FFFFFF; font-weight: bold; background-color: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 8px; text-shadow: 2px 2px 4px black; z-index: 100; transition: opacity 0.5s;"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 场景、相机、渲染器 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        // 添加平滑的迷雾过渡，营造“逐渐加载”的效果
        scene.fog = new THREE.Fog(0x87CEEB, 80, 110); 

        // --- 白云系统 ---
        const cloudGeo = new THREE.BoxGeometry(12, 3, 12);
        const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
        const clouds = new THREE.Group();
        for (let i = 0; i < 60; i++) {
            let mesh = new THREE.Mesh(cloudGeo, cloudMat);
            mesh.position.set((Math.random() - 0.5) * 300, 60 + Math.random() * 8, (Math.random() - 0.5) * 300);
            clouds.add(mesh);
        }
        scene.add(clouds);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 150); // 远裁剪面适配迷雾距离
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" }); // 关闭抗锯齿，强制高性能，拯救卡顿
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 【致命 Bug 修复】：窗口大小改变时，必须更新相机，否则十字准星和实际的 3D 中心会错位！！！
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 50, 20);
        scene.add(dirLight);

        // 手持火把光源
        const heldTorchLight = new THREE.PointLight(0xffdd88, 0, 15);
        camera.add(heldTorchLight);
        scene.add(camera); // 确保 camera 在场景中，让光源生效

        // 放置的火把光源
        const torchLights = new Map();

        // --- 材质生成器 ---
        function createTexture(type) {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            if (type === 'grass_side') {
                // 16x16 像素风草方块侧面
                for(let x=0; x<64; x+=4) {
                    let grassDepth = 12 + Math.floor(Math.random()*4)*4;
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        if (y < grassDepth) { // 顶部草皮
                            ctx.fillStyle = r < 0.3 ? '#558b2f' : (r < 0.7 ? '#689f38' : '#7cb342');
                        } else { // 底部泥土
                            ctx.fillStyle = r < 0.3 ? '#6d4c41' : (r < 0.7 ? '#795548' : '#8d6e63');
                        }
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'grass_top') {
                // 16x16 像素风草皮顶面
                for(let x=0; x<64; x+=4) {
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        ctx.fillStyle = r < 0.3 ? '#558b2f' : (r < 0.7 ? '#689f38' : '#7cb342');
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'wood_side') {
                // 16x16 像素风原木侧面 (竖条纹树皮)
                for(let x=0; x<64; x+=4) {
                    let baseDark = Math.random() < 0.4;
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        if (baseDark) ctx.fillStyle = r < 0.5 ? '#3e2723' : '#4e342e';
                        else ctx.fillStyle = r < 0.5 ? '#4e342e' : '#5d4037';
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'wood_top') {
                // 16x16 像素风原木顶面 (年轮)
                for(let x=0; x<64; x+=4) {
                    for(let y=0; y<64; y+=4) {
                        let dx = Math.abs(x - 30);
                        let dy = Math.abs(y - 30);
                        let dist = Math.max(dx, dy); // 方形距离
                        let r = Math.random();
                        if (dist > 24) ctx.fillStyle = r < 0.5 ? '#3e2723' : '#4e342e'; // 外皮
                        else if (dist > 16 && dist <= 20) ctx.fillStyle = r < 0.5 ? '#8d6e63' : '#795548'; // 纹路
                        else if (dist > 4 && dist <= 8) ctx.fillStyle = r < 0.5 ? '#8d6e63' : '#795548'; // 纹路
                        else ctx.fillStyle = r < 0.5 ? '#a1887f' : '#8d6e63'; // 核心
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'leaves') {
                // 16x16 像素风树叶 (带透明镂空)
                ctx.clearRect(0,0,64,64);
                for(let x=0; x<64; x+=4) {
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        if (r >= 0.15) { // 15% 空隙
                            ctx.fillStyle = r < 0.4 ? '#1b5e20' : (r < 0.7 ? '#2e7d32' : '#388e3c');
                            ctx.fillRect(x,y,4,4);
                        }
                    }
                }
            } else if (type === 'stone') {
                // 16x16 像素风石头
                for(let x=0; x<64; x+=4) {
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        ctx.fillStyle = r < 0.2 ? '#616161' : (r < 0.8 ? '#757575' : '#9e9e9e');
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'dirt') {
                // 16x16 像素风泥土
                for(let x=0; x<64; x+=4) {
                    for(let y=0; y<64; y+=4) {
                        let r = Math.random();
                        ctx.fillStyle = r < 0.3 ? '#6d4c41' : (r < 0.7 ? '#795548' : '#8d6e63');
                        ctx.fillRect(x,y,4,4);
                    }
                }
            } else if (type === 'glass') {
                ctx.fillStyle = 'rgba(255,255,255,0.1)';
                ctx.fillRect(0,0,64,64);
                ctx.strokeStyle = 'rgba(0,0,0,0.5)'; 
                ctx.lineWidth = 4;
                ctx.strokeRect(2,2,60,60);
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillRect(4, 4, 8, 8);
                ctx.fillRect(52, 4, 8, 8);
                ctx.fillRect(4, 52, 8, 8);
                ctx.fillRect(52, 52, 8, 8);
            } else if (type === 'ladder') {
                ctx.clearRect(0,0,64,64); 
                ctx.fillStyle = '#8B5A2B'; 
                ctx.fillRect(4, 0, 8, 64); 
                ctx.fillRect(52, 0, 8, 64); 
                for(let i=10; i<64; i+=15) ctx.fillRect(12, i, 40, 6); 
            } else if (type === 'door_bottom') {
                ctx.fillStyle = '#5D4037'; ctx.fillRect(0,0,64,64);
                ctx.strokeStyle = '#3E2723'; ctx.lineWidth=6; ctx.strokeRect(0,0,64,64);
                ctx.fillStyle = '#FFC107'; ctx.fillRect(46, 25, 8, 12); 
            } else if (type === 'door_top') {
                ctx.fillStyle = '#5D4037'; ctx.fillRect(0,0,64,64);
                ctx.strokeStyle = '#3E2723'; ctx.lineWidth=6; ctx.strokeRect(0,0,64,64);
                // 真正的透明窗户
                ctx.clearRect(12, 12, 16, 24);
                ctx.clearRect(36, 12, 16, 24);
            } else if (type === 'door_open') {
                ctx.clearRect(0,0,64,64);
                ctx.fillStyle = '#5D4037'; ctx.fillRect(0,0,12,64);
                ctx.strokeStyle = '#3E2723'; ctx.lineWidth=2; ctx.strokeRect(0,0,12,64);
            } else if (type === 'zombie_face') {
                ctx.fillStyle = '#2E7D32'; ctx.fillRect(0,0,64,64); // 绿底
                ctx.fillStyle = '#000000'; // 黑眼睛和嘴巴
                ctx.fillRect(12, 16, 12, 12); // 左眼
                ctx.fillRect(40, 16, 12, 12); // 右眼
                ctx.fillRect(24, 40, 16, 12); // 嘴巴
            } else if (type === 'crafting_top') {
                ctx.fillStyle = '#CD853F'; ctx.fillRect(0,0,64,64);
                ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 4;
                for(let i=0; i<=3; i++) { ctx.beginPath(); ctx.moveTo(i*21,0); ctx.lineTo(i*21,64); ctx.stroke(); }
                for(let i=0; i<=3; i++) { ctx.beginPath(); ctx.moveTo(0,i*21); ctx.lineTo(64,i*21); ctx.stroke(); }
            } else if (type === 'crafting_side') {
                ctx.fillStyle = '#8B5A2B'; ctx.fillRect(0,0,64,64);

        window.initAudio = function() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        let isGameStarted = false;
        let bgmOscillators = [];
        let bgmGainNode = null;

        window.startBGM = function() {
            if (!audioCtx) return;
            // 如果已经有在播放的 BGM，先清理掉
            window.stopBGM();
            
            bgmGainNode = audioCtx.createGain();
            bgmGainNode.gain.value = 0.15; // 整体音量轻柔
            bgmGainNode.connect(audioCtx.destination);

            // 悠哉催眠曲的音符序列 (C大调五声音阶: C, D, E, G, A)
            // 频率对应: C4(261.6), D4(293.7), E4(329.6), G4(392.0), A4(440.0)
            const notes = [
                261.63, 329.63, 392.00, 440.00, 
                392.00, 329.63, 293.66, 329.63,
                261.63, 392.00, 523.25, 392.00,
                329.63, 261.63, 293.66, 392.00
            ];
            
            const tempo = 1.2; // 每个音符的持续时间（秒），悠长缓慢
            const now = audioCtx.currentTime;
            
            // 循环播放的逻辑通过在未来预定很多音符来实现
            // Web Audio API 最好是用一个独立的逻辑循环，这里为了简单稳定，直接排好未来 10 分钟的音符
            const loopCount = 50; 
            for (let loop = 0; loop < loopCount; loop++) {
                for (let i = 0; i < notes.length; i++) {
                    const startTime = now + (loop * notes.length + i) * tempo;
                    
                    const osc = audioCtx.createOscillator();
                    osc.type = 'sine'; // 正弦波最纯净，像催眠曲、八音盒
                    osc.frequency.value = notes[i];
                    
                    const gain = audioCtx.createGain();
                    // 包络：淡入淡出，极其柔和
                    gain.gain.setValueAtTime(0, startTime);
                    gain.gain.linearRampToValueAtTime(1.0, startTime + tempo * 0.4);
                    gain.gain.linearRampToValueAtTime(0, startTime + tempo);
                    
                    osc.connect(gain);
                    gain.connect(bgmGainNode);
                    
                    osc.start(startTime);
                    osc.stop(startTime + tempo);
                    
                    bgmOscillators.push(osc);
                }
            }
        };

        window.stopBGM = function() {
            bgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e){}
            });
            bgmOscillators = [];
            if (bgmGainNode) {
                bgmGainNode.disconnect();
                bgmGainNode = null;
            }
        };

        window.connectToServer = function() {
            let ip = document.getElementById('server-ip').value.trim();
            if (!ip) ip = 'Minecraft';
            const url = `ws://${ip}:8081`;
            
            showToast("正在连接服务器...");
            
            ws = new WebSocket(url);
            
            ws.onopen = () => {
                showToast("联机成功！");
                hideMultiplayerMenu();
                window.startNewGame(false);
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'join') {
                    showToast("有新玩家加入了游戏！");
                } else if (data.type === 'leave') {
                    showToast("玩家已退出");
                    if (remotePlayers[data.id]) {
                        scene.remove(remotePlayers[data.id]);
                        delete remotePlayers[data.id];
                    }
                } else if (data.type === 'pos') {
                    if (!remotePlayers[data.id]) {
                        remotePlayers[data.id] = createRemotePlayer();
                    }
                    // 更新位置和旋转
                    const p = remotePlayers[data.id];
                    p.position.set(data.x, data.y, data.z);
                    p.rotation.y = data.ry;
                } else if (data.type === 'block') {
                    if (data.action === 'place') {
                        setBlock(data.x, data.y, data.z, data.blockType);
                        playSound('place');
                    } else if (data.action === 'break') {
                        setBlock(data.x, data.y, data.z, 0);
                        playSound('dig');
                    }
                }
            };
            
            ws.onerror = () => {
                showToast("连接失败，请检查服务器地址是否正确！");
            };
            
            ws.onclose = () => {
                if (isGameStarted) {
                    showToast("已与服务器断开连接");
                }
            };
        };

        window.loadSaveFile = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    
                    // 清理旧区块
                    for (let [key, meshes] of chunkMeshes) {
                        for (let type in meshes) {
                            scene.remove(meshes[type]);
                            if (meshes[type].geometry) meshes[type].geometry.dispose();
                        }
                    }
                    chunkMeshes.clear();
                    rebuildQueue.clear();
                    heightCache.clear();
                    worldMap.clear();
                    modifiedColumns.clear();
                    columnMinY.clear();
                    chunkMaxY.clear();
                    
                    // 清理实体
                    zombies.forEach(z => scene.remove(z.mesh)); zombies = [];
                    villagers.forEach(v => scene.remove(v.mesh)); villagers = [];
                    animals.forEach(a => scene.remove(a.mesh)); animals = [];
                    minecarts.forEach(m => scene.remove(m.mesh)); minecarts = [];
                    
                    // 重建光源
                    for (let [key, light] of torchLights) {
                        scene.remove(light);
                    }
                    torchLights.clear();
                    
                    // 恢复数据
                    seed = data.seed;
                    camera.position.set(data.camera.x, data.camera.y, data.camera.z);
                    if (data.camera.rx !== undefined) {
                        camera.rotation.set(data.camera.rx, data.camera.ry, data.camera.rz);
                    }
                    dayTime = data.dayTime || Math.PI / 2;
                    oxygen = data.oxygen || 20;
                    
                    data.worldMap.forEach(([k, v]) => worldMap.set(k, v));
                    if (data.modifiedColumns) data.modifiedColumns.forEach(v => modifiedColumns.add(v));
                    if (data.columnMinY) data.columnMinY.forEach(([k, v]) => columnMinY.set(k, v));
                    if (data.chunkMaxY) data.chunkMaxY.forEach(([k, v]) => chunkMaxY.set(k, v));
                    
                    // 重新添加火把光源
                    worldMap.forEach((type, key) => {
                        if (type === 16) {
                            const [x, y, z] = key.split(',').map(Number);
                            let l = new THREE.PointLight(0xffdd88, 1.5, 12);
                            l.position.set(x, y, z);
                            scene.add(l);
                            torchLights.set(key, l);
                        }
                    });
                    
                    lastChunkX = -999;
                    lastChunkZ = -999;
                    chunkQueue.length = 0;
                    updateChunks(camera.position);
                    isGameStarted = true;
                    window.initAudio();
                    // 导入存档代表进入游戏，同样停止播放主菜单 BGM
                    window.stopBGM(); 
                    
                    // 隐藏开始菜单，显示暂停菜单，让用户手动点击“继续游戏”以获得合法的鼠标锁定权限
                    document.getElementById('start-menu').style.display = 'none';
                    document.getElementById('pause-menu').style.display = 'block';
                    document.getElementById('blocker').style.display = 'flex';
                    
                } catch (err) {
                    console.error("加载存档失败", err);
                    alert("存档文件已损坏或格式不正确！");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 允许重复加载同一个文件
        };

        function playSound(type) {
            if (!audioCtx) return; 
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const now = audioCtx.currentTime;
            
            if (type === 'dig' || type === 'place') {
                // 咔嚓/沙沙声 (泥土/放置/采集)：清脆的带通白噪声
                const duration = 0.12; 
                
                const bufferSize = audioCtx.sampleRate * duration;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1);
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass'; 
                filter.frequency.setValueAtTime(1500, now);
                filter.Q.setValueAtTime(0.5, now);

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(2.0, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, now + duration);

                noise.connect(filter);
                filter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                
                noise.start(now);
                
            } else if (type === 'stone') {
                // 咣咣声 (石头)：沉闷、有敲击感的低频方波+极短的噪声
                const duration = 0.15;
                
                // 敲击核心 (咣)
                const osc = audioCtx.createOscillator();
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(120, now); // 低沉的音调
                osc.frequency.exponentialRampToValueAtTime(50, now + duration);
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + duration);
                
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(1.5, now);
                oscGain.gain.exponentialRampToValueAtTime(0.01, now + duration);
                
                osc.connect(filter);
                filter.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + duration);
                
                // 附加一点敲击碎屑声
                const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
                for(let i=0; i<noiseBuf.length; i++) noiseBuf.getChannelData(0)[i] = Math.random()*2-1;
                const noise = audioCtx.createBufferSource();
                noise.buffer = noiseBuf;
                const nFilter = audioCtx.createBiquadFilter();
                nFilter.type = 'highpass';
                nFilter.frequency.setValueAtTime(1000, now);
                const nGain = audioCtx.createGain();
                nGain.gain.setValueAtTime(0.5, now);
                nGain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                noise.connect(nFilter).connect(nGain).connect(audioCtx.destination);
                noise.start(now);

            } else if (type === 'glass') {
                // 真正的玻璃碎裂声 (清脆、爆裂、高频碎片)
                const duration = 0.4;
                const bufferSize = audioCtx.sampleRate * duration;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                
                // 瞬间爆裂的粉碎噪声
                for (let i = 0; i < bufferSize; i++) {
                    let decay = Math.exp(-i / (audioCtx.sampleRate * 0.03));
                    data[i] = (Math.random() * 2 - 1) * decay;
                }
                const mainNoise = audioCtx.createBufferSource();
                mainNoise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.setValueAtTime(5000, now); // 极高频过滤，只保留刺耳的碎片声

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(4.0, now);

                mainNoise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                mainNoise.start(now);

                // 几片玻璃渣落地声 (叮当)
                for (let i = 0; i < 5; i++) {
                    const t = now + 0.02 + Math.random() * 0.15;
                    const shardDur = 0.1;
                    const osc = audioCtx.createOscillator();
                    osc.type = 'triangle'; // 三角波最适合模拟玻璃的清脆“叮”声
                    osc.frequency.setValueAtTime(6000 + Math.random() * 4000, t);
                    
                    const sGain = audioCtx.createGain();
                    sGain.gain.setValueAtTime(0.0, t - 0.001); // 避免爆音
                    sGain.gain.linearRampToValueAtTime(1.0, t + 0.01);
                    sGain.gain.exponentialRampToValueAtTime(0.01, t + shardDur);
                    
                    osc.connect(sGain);
                    sGain.connect(audioCtx.destination);
                    osc.start(t);
                    osc.stop(t + shardDur);
                }
            } else if (type === 'gun') {
                // 枪声：极其短促有力的爆裂声
                const duration = 0.3;
                const bufferSize = audioCtx.sampleRate * duration;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (audioCtx.sampleRate * 0.05));
                }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(3000, now);

                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(2.0, now);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start(now);
                
                // 枪的机械声
                const osc = audioCtx.createOscillator();
                osc.type = 'square';
                osc.frequency.setValueAtTime(100, now);
                osc.frequency.exponentialRampToValueAtTime(10, now + 0.1);
                
                const oscGain = audioCtx.createGain();
                oscGain.gain.setValueAtTime(1.0, now);
                oscGain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                
                osc.connect(oscGain);
                oscGain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.1);

            } else if (type === 'zombie') {
                return; // 用户要求去除恐怖的僵尸声音
            }
        }

        // --- 实体(僵尸、村民、矿车、动物)与昼夜 ---
        let zombies = [];
        let villagers = [];
        let minecarts = [];
        let animals = [];
        const matPig = new THREE.MeshLambertMaterial({ color: 0xFFC0CB }); // 粉色猪
        const matSheep = new THREE.MeshLambertMaterial({ color: 0xFFFFFF }); // 白色羊
        const matCow = new THREE.MeshLambertMaterial({ color: 0x8B4513 }); // 棕色牛

        let ridingMinecart = null;
        let oxygen = 20;
        let dayTime = Math.PI / 2; // 开局直接设置为正午(白天)，避免黑屏

        // --- 异步区块重建系统 ---
        // 为了防止核弹爆炸或者大面积地形修改时主线程卡死导致“鼠标失灵”、“无法交互”，我们引入了队列处理
        const rebuildQueue = new Set();
        function processRebuildQueue() {
            if (rebuildQueue.size === 0) return;
            // 每次最多处理 2 个区块的重建，保证游戏丝滑不卡顿
            let count = 0;
            const toRemove = [];
            for (let key of rebuildQueue) {
                const [cx, cz] = key.split(',').map(Number);
                if (Number.isFinite(cx) && Number.isFinite(cz)) {
                    buildChunkMesh(cx, cz);
                }
                toRemove.push(key);
                count++;
                if (count >= 2) break;
            }
            for (let key of toRemove) {
                rebuildQueue.delete(key);
            }
        }
        const worldMap = new Map(); 
        const chunkMeshes = new Map(); 
        const CHUNK_SIZE = 16; // 增加区块大小，减少 draw call
        const RENDER_DISTANCE = 7; // 半径 7 个区块（112格），刚好覆盖 100 格视野，配合迷雾实现平滑加载
        const chunkMaxY = new Map(); 
        const modifiedColumns = new Set(); // 记录被玩家挖过的列，用于极限性能优化
        const columnMinY = new Map(); // 记录每列被修改过的最深位置，用于无限向下挖掘的渲染
        const TNT_ID = 21;
        const NUKE_ID = 22;

        let seed = Math.random() * 1000;
        function hash(x, z) {
            let val = Math.sin(x * 12.9898 + z * 78.233 + seed) * 43758.5453;
            return val - Math.floor(val);
        }
        
        const heightCache = new Map(); // 添加高度缓存，极大提升加载速度
        function getSurfaceHeight(x, z) {
            const key = `${x},${z}`;
            if (heightCache.has(key)) return heightCache.get(key);
            
            // 恢复旧的平缓地形，避免高山掩埋以前的存档建筑
            let h = 10;
            h += Math.sin(x * 0.1) * 2;
            h += Math.cos(z * 0.1) * 2;
            h += Math.sin((x + z) * 0.05) * 2;
            
            h = Math.floor(h);
            
            heightCache.set(key, h);
            return h;
        }

        // 用于在生成树木和房子时安全地放置方块并更新渲染边界
        function setGenBlock(x, y, z, type) {
            worldMap.set(`${x},${y},${z}`, type);
            modifiedColumns.add(`${x},${z}`);
            const colKey = `${x},${z}`;
            const curMinY = columnMinY.get(colKey);
            if (curMinY === undefined || y < curMinY) columnMinY.set(colKey, y);
            const cx = Math.floor(x / CHUNK_SIZE);
            const cz = Math.floor(z / CHUNK_SIZE);
            let key = `${cx},${cz}`;
            let currentMax = chunkMaxY.get(key) || -999;
            if (y > currentMax) chunkMaxY.set(key, y);
        }

        function getBlock(x, y, z) {
            const key = `${x},${y},${z}`;
            if (worldMap.has(key)) return worldMap.get(key);
            
            const h = getSurfaceHeight(x, z);
            const seaLevel = 8;
            
            if (y > h) {
                if (y <= seaLevel) {
                    // 海带生成逻辑：在海床上方，并且不超过海平面
                    if (y > h && y < seaLevel && Math.abs(hash(x * 3.14, z * 2.71)) < 0.1) {
                        return 25; // 海带
                    }
                    return 24; // 水
                }
                return 0; // 空气
            }
            
            if (h <= seaLevel + 1) { // 沙滩和海底
                if (y > h - 3) return 23; // 沙子
                return 3; // 石头
            }
            
            if (y === h) return 1; // 草地
            if (y > h - 3) return 2; // 泥土
            return 3; // 石头
        }

        // 极速透明方块检测函数
        function isTransparent(bx, by, bz) {
            const key = `${bx},${by},${bz}`;
            if (worldMap.has(key)) {
                const t = worldMap.get(key);
                return [0, 6, 7, 8, 9, 10, 11, 16, 17, 18, 19, 20, 24, 25, 26, 27, 28, 30, 31].includes(t);
            }
            // 海平面下的天然地形如果没生成，可能是水或者沙子
            if (by <= 12 && by > getSurfaceHeight(bx, bz)) {
                return true; // 水也是透明的
            }
            return by > getSurfaceHeight(bx, bz);
        }

        function setBlock(x, y, z, type) {
            modifiedColumns.add(`${x},${z}`); // 记录该列已被修改
            const colKey = `${x},${z}`;
            const curMinY = columnMinY.get(colKey);
            if (curMinY === undefined || y < curMinY) columnMinY.set(colKey, y);

            let key = `${x},${y},${z}`;
            worldMap.set(key, type);
            
            if (type === 16) {
                if (!torchLights.has(key)) {
                    let l = new THREE.PointLight(0xffdd88, 1.5, 12);
                    l.position.set(x, y, z);
                    scene.add(l);
                    torchLights.set(key, l);
                }
            } else {
                if (torchLights.has(key)) {
                    scene.remove(torchLights.get(key));
                    torchLights.delete(key);
                }
            }
            
            const cx = Math.floor(x / CHUNK_SIZE);
            const cz = Math.floor(z / CHUNK_SIZE);
            
            function updateMaxY(chkX, chkZ, checkY) {
                let key = `${chkX},${chkZ}`;
                let currentMax = chunkMaxY.get(key) || -999;
                if (checkY > currentMax) chunkMaxY.set(key, checkY);
            }
            
            updateMaxY(cx, cz, y);
            buildChunkMesh(cx, cz);
            
            // 修复负数坐标求模的 Bug，确保边界相邻区块正确刷新
            let modX = ((x % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            let modZ = ((z % CHUNK_SIZE) + CHUNK_SIZE) % CHUNK_SIZE;
            
            if (modX === 0) { updateMaxY(cx - 1, cz, y); buildChunkMesh(cx - 1, cz); }
            if (modX === CHUNK_SIZE - 1) { updateMaxY(cx + 1, cz, y); buildChunkMesh(cx + 1, cz); }
            if (modZ === 0) { updateMaxY(cx, cz - 1, y); buildChunkMesh(cx, cz - 1); }
            if (modZ === CHUNK_SIZE - 1) { updateMaxY(cx, cz + 1, y); buildChunkMesh(cx, cz + 1); }
        }

        function setBlockNoRebuild(x, y, z, type, dirtyChunks) {
            modifiedColumns.add(`${x},${z}`);
            const colKey = `${x},${z}`;
            const curMinY = columnMinY.get(colKey);
            if (curMinY === undefined || y < curMinY) columnMinY.set(colKey, y);
            const key = `${x},${y},${z}`;
            worldMap.set(key, type);

            if (type === 16) {
                if (!torchLights.has(key)) {
                    let l = new THREE.PointLight(0xffdd88, 1.5, 12);
                    l.position.set(x, y, z);
                    scene.add(l);
                    torchLights.set(key, l);
                }
            } else {
                if (torchLights.has(key)) {
                    scene.remove(torchLights.get(key));
                    torchLights.delete(key);
                }
            }

            const cx = Math.floor(x / CHUNK_SIZE);
            const cz = Math.floor(z / CHUNK_SIZE);
            dirtyChunks.add(`${cx},${cz}`);
            dirtyChunks.add(`${cx - 1},${cz}`);
            dirtyChunks.add(`${cx + 1},${cz}`);
            dirtyChunks.add(`${cx},${cz - 1}`);
            dirtyChunks.add(`${cx},${cz + 1}`);
        }

        function igniteTNT(x, y, z) {
            const visited = new Set();
            const queue = [{ x, y, z }];
            const dirtyChunks = new Set();

            while (queue.length > 0) {
                const p = queue.shift();
                const k = `${p.x},${p.y},${p.z}`;
                if (visited.has(k)) continue;
                visited.add(k);

                if (getBlock(p.x, p.y, p.z) !== TNT_ID) continue;

                setBlockNoRebuild(p.x, p.y, p.z, 0, dirtyChunks);

                const radius = 2;
                for (let dx = -radius; dx <= radius; dx++) {
                    for (let dz = -radius; dz <= radius; dz++) {
                        let depth = (Math.abs(dx) <= 1 && Math.abs(dz) <= 1) ? 2 : (Math.random() < 0.35 ? 2 : 1);
                        for (let dy = 0; dy <= depth; dy++) {
                            const bx = p.x + dx;
                            const by = p.y - dy;
                            const bz = p.z + dz;
                            const t = getBlock(bx, by, bz);
                            if (t === TNT_ID) queue.push({ x: bx, y: by, z: bz });
                            if (t !== 0) setBlockNoRebuild(bx, by, bz, 0, dirtyChunks);
                        }
                    }
                }
            }

            for (let key of dirtyChunks) {
                rebuildQueue.add(key);
            }
        }

        function igniteNuke(x, y, z) {
            const dirtyChunks = new Set();
            const radius = 1; // 半径 1，形成 3x3x3 的立方体

            for (let i = zombies.length - 1; i >= 0; i--) {
                if (Math.abs(zombies[i].mesh.position.x - x) <= radius && 
                    Math.abs(zombies[i].mesh.position.y - y) <= radius && 
                    Math.abs(zombies[i].mesh.position.z - z) <= radius) {
                    scene.remove(zombies[i].mesh);
                    zombies.splice(i, 1);
                }
            }
            for (let i = villagers.length - 1; i >= 0; i--) {
                if (Math.abs(villagers[i].mesh.position.x - x) <= radius && 
                    Math.abs(villagers[i].mesh.position.y - y) <= radius && 
                    Math.abs(villagers[i].mesh.position.z - z) <= radius) {
                    scene.remove(villagers[i].mesh);
                    villagers.splice(i, 1);
                }
            }

            setBlockNoRebuild(x, y, z, 0, dirtyChunks);

            // 彻底的 100x100x100 立方体毁灭，忽略任何地形高度，全部强制清空
            for (let dx = -radius; dx <= radius; dx++) {
                for (let dy = -radius; dy <= radius; dy++) {
                    for (let dz = -radius; dz <= radius; dz++) {
                        const bx = x + dx;
                        const by = y + dy;
                        const bz = z + dz;
                        const t = getBlock(bx, by, bz);
                        if (t !== 0) setBlockNoRebuild(bx, by, bz, 0, dirtyChunks);
                    }
                }
            }

            for (let key of dirtyChunks) {
                rebuildQueue.add(key);
            }
        }

        function buildChunkMesh(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunkMeshes.has(key)) {
                // 清理旧的 InstancedMesh
                for (let type in chunkMeshes.get(key)) {
                let mesh = chunkMeshes.get(key)[type];
                scene.remove(mesh);
                if (mesh.geometry) mesh.geometry.dispose();
                // We reuse materials, so no need to dispose them
            }
            }
            
            const startX = cx * CHUNK_SIZE;
            const startZ = cz * CHUNK_SIZE;

            // 【真正的终极性能修复：InstancedMesh + 表面剔除算法】
            let typeCounts = {};
            let blockData = [];

            let top = chunkMaxY.has(key) ? chunkMaxY.get(key) : -999;
            for (let x = startX; x < startX + CHUNK_SIZE; x++) {
                for (let z = startZ; z < startZ + CHUNK_SIZE; z++) {
                    const h = getSurfaceHeight(x, z);
                    if (h > top) top = h;
                }
            }

            const viewTop = Math.floor(camera.position.y + 120); // 增加上方视野，防止向上看时切断
            const viewBottom = Math.floor(camera.position.y - 180); // 摄像机往下 180 格
            // 如果玩家挖得很深，依然要保证最高点能够渲染到表面的建筑或树木，因此不能直接被 viewTop 截断得太死
            // 为了防止在深坑里看不到地面的树和房子，当 yStart 被截断时，依然保留地表那一层的渲染
            const yStart = top; // 取消 viewTop 的硬截断，因为我们要保留上下相连！

            for (let x = startX; x < startX + CHUNK_SIZE; x++) {
                for (let z = startZ; z < startZ + CHUNK_SIZE; z++) {
                    const h = getSurfaceHeight(x, z);
                    
                    let scanBottom = viewBottom;
                    const colKey = `${x},${z}`;
                    
                    // 【终极无限向下挖掘优化】
                    // 默认情况下，深层地下全都是石头，不接触空气，不需要渲染。
                    // 只有当玩家在这个坐标“往下挖过”（修改过这个列）时，我们才需要往下扫描寻找被挖出的洞。
                    // 这样即使取消了硬性底部限制，只要没挖过的地方，计算量依然是 0。
                    
                    if (!modifiedColumns.has(colKey) &&
                        !modifiedColumns.has(`${x+1},${z}`) &&
                        !modifiedColumns.has(`${x-1},${z}`) &&
                        !modifiedColumns.has(`${x},${z+1}`) &&
                        !modifiedColumns.has(`${x},${z-1}`)) {
                        
                        // 没挖过的地方，只扫描到附近地形的最低表面即可
                        const minNeighborH = Math.min(
                            getSurfaceHeight(x, z),
                            getSurfaceHeight(x+1, z),
                            getSurfaceHeight(x-1, z),
                            getSurfaceHeight(x, z+1),
                            getSurfaceHeight(x, z-1)
                        );
                        scanBottom = minNeighborH - 2; // 不要限制在 viewBottom，确保不会出现切断层
                    } else {
                        // 如果挖过了，获取这列被挖到的最深处
                        // 【无限挖掘核心修复】：不仅要考虑这一列的最深处，还要考虑周围四个方块被挖出的坑，这样才能看到周围洞穴的墙壁！
                        const myMin = columnMinY.has(colKey) ? columnMinY.get(colKey) : Infinity;
                        const rightMin = columnMinY.has(`${x+1},${z}`) ? columnMinY.get(`${x+1},${z}`) : Infinity;
                        const leftMin = columnMinY.has(`${x-1},${z}`) ? columnMinY.get(`${x-1},${z}`) : Infinity;
                        const upMin = columnMinY.has(`${x},${z+1}`) ? columnMinY.get(`${x},${z+1}`) : Infinity;
                        const downMin = columnMinY.has(`${x},${z-1}`) ? columnMinY.get(`${x},${z-1}`) : Infinity;
                        
                        let deepMin = Math.min(myMin, rightMin, leftMin, upMin, downMin);
                        
                        // 即使挖过了，依然要确保渲染天然的表面
                        const localMinH = Math.min(
                            getSurfaceHeight(x, z),
                            getSurfaceHeight(x+1, z),
                            getSurfaceHeight(x-1, z),
                            getSurfaceHeight(x, z+1),
                            getSurfaceHeight(x, z-1)
                        );
                        
                        if (deepMin !== Infinity) {
                            scanBottom = Math.min(deepMin - 2, localMinH - 2); // 同样取消 viewBottom/150 的限制，只要挖了，从上到下全画！
                        } else {
                            scanBottom = localMinH - 2;
                        }
                    }
                    
                    // 从最高点一直往下检查到扫描底线
                    for (let y = yStart; y >= scanBottom; y--) {
                        // 距离优化：如果这个方块距离玩家垂直距离实在太远（比如相差 300 层以上），为了性能可以稍微跳过，
                        // 但对于 100 多层的深渊，必须完整渲染保证上下相连。
                        if (Math.abs(y - camera.position.y) > 300) continue; 
                        let type = getBlock(x, y, z);
                        if (type !== 0) {
                            let exposed = true;
                            if (y < h) {
                                // 使用极速透明检测函数，大幅减少多余计算
                                exposed = isTransparent(x, y+1, z) || 
                                          isTransparent(x+1, y, z) || 
                                          isTransparent(x-1, y, z) || 
                                          isTransparent(x, y, z+1) || 
                                          isTransparent(x, y, z-1) || 
                                          isTransparent(x, y-1, z);
                            }
                            
                            if (exposed) {
                                if (!typeCounts[type]) typeCounts[type] = 0;
                                typeCounts[type]++;
                                blockData.push({ x, y, z, type });
                            }
                        }
                    }
                }
            }

            // 创建 InstancedMesh 字典
            const instancedMeshes = {};
            const matrix = new THREE.Matrix4();
            const typeIndices = {};

            for (let type in typeCounts) {
                let count = typeCounts[type];
                let typeInt = parseInt(type);
                let geo = boxGeo;
                if (typeInt === 16 || typeInt === 25 || typeInt === 30) geo = torchGeo; // 火把、海带、拉杆
                else if (typeInt === 26 || typeInt === 27 || typeInt === 28) geo = flatGeo; // 铁轨、红石
                
                let iMesh = new THREE.InstancedMesh(geo, materials[type], count);
                iMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
                instancedMeshes[type] = iMesh;
                typeIndices[type] = 0;
                scene.add(iMesh);
            }

            // 填充矩阵数据
            for (let b of blockData) {
                matrix.setPosition(b.x, b.y, b.z);
                let idx = typeIndices[b.type];
                instancedMeshes[b.type].setMatrixAt(idx, matrix);
                typeIndices[b.type]++;
            }

            for (let type in instancedMeshes) {
                instancedMeshes[type].instanceMatrix.needsUpdate = true;
            }

            chunkMeshes.set(key, instancedMeshes);
        }

        function generateHouseData(cx, cz) {
            let key = `house_${cx},${cz}`;
            if (worldMap.has(key)) return;
            worldMap.set(key, true);
            
            // 5% 的概率生成一个 10x10 的房子
            if (Math.abs(hash(cx * 2, cz * 2)) < 0.05) {
                let baseX = cx * CHUNK_SIZE + 8;
                let baseZ = cz * CHUNK_SIZE + 8;
                let baseY = getSurfaceHeight(baseX, baseZ);
                
                // 1. 先挖空内部，并打好地基（防止悬空和泥土穿模）
                for(let dx=-4; dx<=5; dx++) {
                    for(let dz=-4; dz<=5; dz++) {
                        let localH = getSurfaceHeight(baseX+dx, baseZ+dz);
                        // 清空上方空间，防止房子被埋在山里
                        for(let dy=baseY+1; dy<=Math.max(baseY+5, localH+2); dy++) {
                            setGenBlock(baseX+dx, dy, baseZ+dz, 0);
                        }
                        // 填实下方地基，防止房子悬空露底
                        // 将地基一路打到这块地最低的自然高度再往下2格，确保无论如何都不悬空
                        for(let dy=baseY-1; dy>=Math.min(baseY-2, localH-2); dy--) {
                            setGenBlock(baseX+dx, dy, baseZ+dz, 3); // 石头地基
                        }
                    }
                }

                // 2. 建造房子主体
                for(let dx=-4; dx<=5; dx++) {
                    for(let dz=-4; dz<=5; dz++) {
                        setGenBlock(baseX+dx, baseY, baseZ+dz, 4); // 木地板
                        setGenBlock(baseX+dx, baseY+5, baseZ+dz, 4); // 木屋顶
                        
                        let isWall = (dx===-4 || dx===5 || dz===-4 || dz===5);
                        if (isWall) {
                            for(let dy=1; dy<=4; dy++){
                                let type = 4;
                                if ((dy === 2 || dy === 3) && (dx === 0 || dz === 0)) type = 6; // 玻璃窗
                                setGenBlock(baseX+dx, baseY+dy, baseZ+dz, type);
                            }
                        }
                    }
                }
                
                // 门
                setGenBlock(baseX, baseY+1, baseZ+5, 8);
                setGenBlock(baseX, baseY+2, baseZ+5, 9);
                
                // 3. 内部家具
                setGenBlock(baseX-3, baseY+1, baseZ-3, 14); // 床头
                setGenBlock(baseX-3, baseY+1, baseZ-2, 15); // 床尾
                setGenBlock(baseX+3, baseY+1, baseZ-3, 12); // 工作台
                setGenBlock(baseX+4, baseY+1, baseZ-3, 13); // 熔炉
                
                // 内部火把
                setGenBlock(baseX, baseY+3, baseZ, 16);
                let l = new THREE.PointLight(0xffdd88, 1.5, 12);
                l.position.set(baseX, baseY+3, baseZ);
                scene.add(l);
                torchLights.set(`${baseX},${baseY+3},${baseZ}`, l);

                // 生成村民
                spawnVillagerAt(baseX, baseY+1, baseZ);
            }
        }

        function generateTrees(cx, cz) {
            let key = `trees_${cx},${cz}`;
            if (worldMap.has(key)) return;
            worldMap.set(key, true);

            // 【修复半边树 Bug】：扩大树木生成的扫描范围（越过区块边界向外扩展两格）
            // 这样当渲染当前区块时，相邻区块边缘的树木枝叶也会被生成，防止被切割
            const startX = cx * CHUNK_SIZE - 2;
            const startZ = cz * CHUNK_SIZE - 2;
            const endX = cx * CHUNK_SIZE + CHUNK_SIZE + 2;
            const endZ = cz * CHUNK_SIZE + CHUNK_SIZE + 2;

            for (let x = startX; x < endX; x++) {
                for (let z = startZ; z < endZ; z++) {
                    // 1.5% 的概率生成树木
                    if (Math.abs(hash(x * 5.12, z * 3.14)) < 0.015) {
                        let baseY = getSurfaceHeight(x, z);
                        let h = 4 + Math.floor(Math.abs(hash(x, z)) * 3); // 树干高度 4~6
                        
                        // 树干
                        for (let y = 1; y <= h; y++) {
                            // 使用 setGenBlock 会自动标记 modifiedColumns 和 chunkMaxY
                            setGenBlock(x, baseY + y, z, 4); 
                        }
                        // 树叶 (球形/钻石形)
                        for (let lx = -2; lx <= 2; lx++) {
                            for (let lz = -2; lz <= 2; lz++) {
                                for (let ly = h - 2; ly <= h + 1; ly++) {
                                    if (Math.abs(lx) + Math.abs(lz) + Math.abs(ly - h) <= 3) {
                                        let lKey = `${x + lx},${baseY + ly},${z + lz}`;
                                        if (!worldMap.has(lKey)) {
                                            setGenBlock(x + lx, baseY + ly, z + lz, 5); 
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }

        let lastChunkX = -999;
        let lastChunkZ = -999;
        const chunkQueue = []; // 异步区块生成队列

        function updateChunks(playerPos) {
            const cx = Math.floor(playerPos.x / CHUNK_SIZE);
            const cz = Math.floor(playerPos.z / CHUNK_SIZE);
            
            if (cx !== lastChunkX || cz !== lastChunkZ) {
                lastChunkX = cx;
                lastChunkZ = cz;
                
                for (let x = cx - RENDER_DISTANCE; x <= cx + RENDER_DISTANCE; x++) {
                    for (let z = cz - RENDER_DISTANCE; z <= cz + RENDER_DISTANCE; z++) {
                        if (!chunkMeshes.has(`${x},${z}`) && !chunkQueue.some(c => c.x === x && c.z === z)) {
                            chunkQueue.push({x, z});
                        }
                    }
                }
                
                for (let [key, meshes] of chunkMeshes.entries()) {
                    let [kx, kz] = key.split(',').map(Number);
                    if (Math.abs(kx - cx) > RENDER_DISTANCE + 1 || Math.abs(kz - cz) > RENDER_DISTANCE + 1) {
                        for (let type in meshes) {
                            let mesh = meshes[type];
                            scene.remove(mesh);
                            if (mesh.geometry) mesh.geometry.dispose();
                        }
                        chunkMeshes.delete(key);
                    }
                }
            }
        }

        function isSolid(bx, by, bz) {
            let b = getBlock(bx, by, bz);
            if (b === 0 || b === 7 || b === 10 || b === 11 || b === 19 || b === 20 || b === 24 || b === 25 || b === 26 || b === 27 || b === 28 || b === 30 || b === 31) return false;
            return true;
        }

        function checkCollision(pos) {
            const checkPoints = [
                new THREE.Vector3(pos.x, pos.y - PLAYER_HEIGHT + 0.1, pos.z), // 脚底
                new THREE.Vector3(pos.x, pos.y - PLAYER_HEIGHT/2, pos.z), // 身体
                new THREE.Vector3(pos.x, pos.y - 0.1, pos.z), // 眼睛
                new THREE.Vector3(pos.x, pos.y + 0.2, pos.z)  // 头顶，防止跳跃时头卡进天花板导致透视虚空
            ];

            for (let pt of checkPoints) {
                const offsets = [
                    [0,0], [PLAYER_RADIUS,0], [-PLAYER_RADIUS,0], [0,PLAYER_RADIUS], [0,-PLAYER_RADIUS]
                ];
                for (let off of offsets) {
                    let bx = Math.round(pt.x + off[0]);
                    let by = Math.round(pt.y);
                    let bz = Math.round(pt.z + off[1]);
                    if (isSolid(bx, by, bz)) {
                        return true; 
                    }
                }
            }
            return false;
        }
